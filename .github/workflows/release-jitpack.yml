name: Release JitPack

on:
  push:
    branches:
      - release/*
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (x.y.z). If empty, parse from release/x.y.z branch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/'))
    runs-on: ubuntu-latest
    env:
      LIB_MODULE: sdk
      RESOURCE_REPO: tjlabs/TJLabsResource-sdk-android
      RESOURCE_TARGET_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: resolve_version
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.release_version }}"

          if [[ -n "${input_version}" ]]; then
            release_version="${input_version}"
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              branch_name="${{ github.head_ref }}"
            else
              branch_name="${GITHUB_REF_NAME}"
            fi

            if [[ "${branch_name}" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              release_version="${BASH_REMATCH[1]}"
            else
              echo "Invalid branch format: ${branch_name}. Expected release/x.y.z"
              exit 1
            fi
          fi

          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${release_version}. Expected x.y.z"
            exit 1
          fi

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Validate module version matches release version
        id: module_version
        shell: bash
        run: |
          set -euo pipefail
          file_kts="${LIB_MODULE}/build.gradle.kts"
          file_groovy="${LIB_MODULE}/build.gradle"

          if [[ -f "${file_kts}" ]]; then
            file="${file_kts}"
          elif [[ -f "${file_groovy}" ]]; then
            file="${file_groovy}"
          else
            echo "Cannot find build.gradle(.kts) for module ${LIB_MODULE}"
            exit 1
          fi

          module_version=""
          if grep -qE 'val[[:space:]]+versionMajor' "${file}"; then
            major="$(grep -E 'val[[:space:]]+versionMajor' "${file}" | head -1 | sed -E 's/.*=[[:space:]]*([0-9]+).*/\1/')"
            minor="$(grep -E 'val[[:space:]]+versionMinor' "${file}" | head -1 | sed -E 's/.*=[[:space:]]*([0-9]+).*/\1/')"
            patch="$(grep -E 'val[[:space:]]+versionPatch' "${file}" | head -1 | sed -E 's/.*=[[:space:]]*([0-9]+).*/\1/')"
            module_version="${major}.${minor}.${patch}"
          else
            module_version="$(grep -E '^[[:space:]]*version[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' "${file}" | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')"
          fi

          if [[ -z "${module_version}" ]]; then
            echo "Failed to parse module version from ${file}"
            exit 1
          fi

          echo "module_version=${module_version}" >> "${GITHUB_OUTPUT}"

          if [[ "${module_version}" != "${{ steps.resolve_version.outputs.release_version }}" ]]; then
            echo "Module version (${module_version}) != release version (${{ steps.resolve_version.outputs.release_version }})"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (Debug/Release)
        run: ./gradlew :${LIB_MODULE}:testDebugUnitTest :${LIB_MODULE}:testReleaseUnitTest --stacktrace --no-daemon

      - name: Publish check (Maven Local)
        run: ./gradlew :${LIB_MODULE}:publishToMavenLocal -x test --stacktrace --no-daemon

      - name: Create and push tag if missing
        shell: bash
        run: |
          set -euo pipefail
          release_version="${{ steps.resolve_version.outputs.release_version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_version}" >/dev/null 2>&1; then
            echo "Tag ${release_version} already exists on origin"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${release_version}"
          git push origin "${release_version}"

      - name: Warm up JitPack build log URL
        id: jitpack
        shell: bash
        run: |
          set -euo pipefail
          release_version="${{ steps.resolve_version.outputs.release_version }}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          url="https://jitpack.io/com/github/${GITHUB_REPOSITORY_OWNER}/${repo_name}/${release_version}/build.log"

          {
            echo "JitPack log URL: ${url}"
            echo
            curl -fsSL "${url}" || echo "JitPack log is not ready yet."
          } > jitpack-build.log

          echo "jitpack_log_url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Upload JitPack build log artifact
        uses: actions/upload-artifact@v4
        with:
          name: jitpack-build-log-${{ steps.resolve_version.outputs.release_version }}
          path: jitpack-build.log

      - name: Dispatch auth release event to resource repo (optional)
        env:
          GH_TOKEN: ${{ secrets.RESOURCE_REPO_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Skip resource dispatch (RESOURCE_REPO_DISPATCH_TOKEN is not configured)."
            exit 0
          fi

          release_version="${{ steps.resolve_version.outputs.release_version }}"
          api_url="https://api.github.com/repos/${RESOURCE_REPO}/dispatches"

          curl -fsSL -X POST "${api_url}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d @- <<JSON
          {
            "event_type": "auth_release_published",
            "client_payload": {
              "auth_repo": "${GITHUB_REPOSITORY}",
              "auth_version": "${release_version}",
              "target_branch": "${RESOURCE_TARGET_BRANCH}"
            }
          }
          JSON
