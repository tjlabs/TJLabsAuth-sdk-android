name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target SDK version (e.g. 1.0.27). Creates release/<version> from main."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid semver: ${{ inputs.version }}"
            exit 1
          fi

      - name: Parse version parts
        id: ver
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.version }}"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Branch must not exist
        run: |
          BRANCH="release/${{ inputs.version }}"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists on origin"
            exit 1
          fi
          git checkout -b "$BRANCH"

      - name: Bump versionMajor / Minor / Patch
        run: |
          sed -i "s/^val versionMajor = .*/val versionMajor = ${{ steps.ver.outputs.major }}/" sdk/build.gradle.kts
          sed -i "s/^val versionMinor = .*/val versionMinor = ${{ steps.ver.outputs.minor }}/" sdk/build.gradle.kts
          sed -i "s/^val versionPatch = .*/val versionPatch = ${{ steps.ver.outputs.patch }}/" sdk/build.gradle.kts
          grep -E '^val version(Major|Minor|Patch) = ' sdk/build.gradle.kts

      - name: Commit & push
        run: |
          BRANCH="release/${{ inputs.version }}"
          git add sdk/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push -u origin "$BRANCH"

      - name: Open Draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="release/${{ inputs.version }}"
          gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --title "release: ${{ inputs.version }}" \
            --body "Auto-generated by Create Release Branch. Continue work on this branch, then mark ready for review."
