name: PR Validate

on:
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      LIB_MODULE: sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (Debug/Release)
        run: ./gradlew :${LIB_MODULE}:testDebugUnitTest :${LIB_MODULE}:testReleaseUnitTest --stacktrace --no-daemon

      - name: Publish check (Maven Local)
        run: ./gradlew :${LIB_MODULE}:publishToMavenLocal -x test --stacktrace --no-daemon
